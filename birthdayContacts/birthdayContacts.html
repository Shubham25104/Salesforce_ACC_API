<template>
    <lightning-card title="🎂 Birthday Wisher" icon-name="standard:event">

        <!-- Loading -->
        <template if:true={isLoading}>
            <div class="slds-align_absolute-center slds-p-around_large">
                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- Error -->
        <template if:true={error}>
            <div class="slds-p-around_medium">
                <p style="color:red;">{error}</p>
            </div>
        </template>

        <!-- Empty State -->
        <template if:true={isEmpty}>
            <div class="slds-align_absolute-center slds-p-around_large">
                <div style="text-align:center;">
                    <p style="font-size:3rem;">🎂</p>
                    <p class="slds-text-heading_small">No birthdays today!</p>
                    <p class="slds-text-body_regular slds-m-top_small">Check back tomorrow 🎉</p>
                </div>
            </div>
        </template>

        <!-- Contact Cards -->
        <template if:true={hasContacts}>
            <div class="slds-p-around_medium">
                <div class="slds-grid slds-wrap slds-gutters">
                    <template for:each={contacts} for:item="contact">
                        <div key={contact.Id} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3 slds-p-around_x-small">
                            <div class="contact-card">
                                <!-- Photo -->
                                <div class="slds-align_absolute-center slds-m-bottom_small">
                                    <template if:true={contact.PhotoUrl}>
                                        <img src={contact.PhotoUrl} alt={contact.Name} class="contact-photo" />
                                    </template>
                                    <template if:false={contact.PhotoUrl}>
                                        <lightning-icon icon-name="standard:contact" size="large"></lightning-icon>
                                    </template>
                                </div>

                                <!-- Info -->
                                <p class="slds-text-heading_small slds-align_absolute-center">{contact.Name}</p>
                                
                                <template if:true={contact.Title}>
                                    <p class="slds-text-body_small slds-align_absolute-center slds-m-top_xx-small" style="color:#706e6b;">{contact.Title}</p>
                                </template>

                                <template if:true={contact.AccountName}>
                                    <p class="slds-text-body_small slds-align_absolute-center slds-m-top_xx-small">{contact.AccountName}</p>
                                </template>

                                <template if:true={contact.Email}>
                                    <p class="slds-text-body_small slds-align_absolute-center slds-m-top_xx-small" style="color:#0176d3;">{contact.Email}</p>
                                </template>

                                <p class="slds-text-body_small slds-align_absolute-center slds-m-top_xx-small">🎂 {contact.birthdateFormatted}</p>

                                <!-- Button -->
                                <div class="slds-align_absolute-center slds-m-top_small">
                                    <lightning-button
                                        label="🎉 Wish Birthday"
                                        variant="brand"
                                        data-id={contact.Id}
                                        data-name={contact.Name}
                                        onclick={handleWish}>
                                    </lightning-button>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>

    </lightning-card>
</template>
